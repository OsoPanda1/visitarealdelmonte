name: "CodeQL Advanced – RDM Digital Hub / TAMV Nodo Cero"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    # Escaneo completo semanal (domingo 19:21 UTC)
    - cron: "21 19 * * 0"
  workflow_dispatch:

permissions:
  # Permisos mínimos a nivel de workflow (principio de menor privilegio)
  actions: read
  contents: read
  packages: read
  security-events: write

env:
  # Categoría base para identificar escaneos de este nodo
  CODEQL_CATEGORY_PREFIX: "/rdm-digital-hub"

jobs:
  analyze:
    name: Analyze – CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # fetch-depth: 0 recomendado para CodeQL (historial completo)
          fetch-depth: 0

      # Setup específico para JS/TS (si aplica)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "npm"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: "+security-extended,security-and-quality"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "${{ env.CODEQL_CATEGORY_PREFIX }}/language:${{ matrix.language }}"
          upload: true
