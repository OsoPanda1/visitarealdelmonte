name: "CI · YUN Sovereign Pipeline"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CI: true
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  fast-checks:
    name: F1 · Static Analysis & Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Restore Dependencies (Hermetic)
        run: npm ci --legacy-peer-deps

      - name: 🔍 Linter Audit
        run: npm run lint

      - name: 📐 Strict Type Compilation Check
        run: npm run typecheck

  build-artifact:
    name: F2 · Sovereign Compilation Engine
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast-checks
    outputs:
      build-outcome: ${{ steps.compile.outcome }}

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Restore Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🚀 Compile Production Build
        id: compile
        run: npm run build

      - name: 📦 Stash Build Artifacts (Universal Reuse)
        uses: actions/upload-artifact@v4
        with:
          name: rdm-production-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  quality:
    name: F3 · Isolated Deterministic Unit Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-artifact

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Restore Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🧪 Execute Deterministic Tests (Vitest)
        run: npm run test:unit -- --reporter=default

  e2e:
    name: F4 · Sharded Headless End-to-End Simulation (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-artifact
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Restore Dependencies
        run: npm ci --legacy-peer-deps

      - name: 📥 Pull Compiled Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: rdm-production-dist
          path: dist

      - name: 💾 Get Playwright Version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies[\"@playwright/test\"].version')" >> "$GITHUB_OUTPUT"

      - name: 🗄️ Cache Playwright Browsers Binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: 🌐 Install Playwright Dependencies (If cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Headless Playwright Shards
        run: npm run test:e2e -- --shard=${{ matrix.shard }}

      - name: 📊 Archive Simulation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 3

  smoke-main:
    name: F5 · Critical Path Smoke Tests (Prod Only)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: build-artifact
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Restore Dependencies
        run: npm ci --legacy-peer-deps

      - name: 📥 Pull Compiled Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: rdm-production-dist
          path: dist

      - name: 💾 Get Playwright Version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies[\"@playwright/test\"].version')" >> "$GITHUB_OUTPUT"

      - name: 🗄️ Cache Playwright Browsers Binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: 🌐 Install Playwright Dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: 🔥 Verify Core Infrastructure Integrity (@smoke)
        run: npm run test:e2e -- --grep "@smoke"

  deploy-vercel:
    name: F6 · Sovereign Continuous Deployment (Vercel Edge)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    environment:
      name: production
      url: https://www.visitarealdelmonte.online

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Restore Dependencies
        run: npm ci --legacy-peer-deps

      - name: 📥 Pull Pre-Compiled Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: rdm-production-dist
          path: dist

      - name: 🚀 Edge Ship (Vercel Core Gateway)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  summary:
    name: F7 · Real-Time Sovereign System Report
    runs-on: ubuntu-latest
    needs: [fast-checks, build-artifact, quality, e2e]
    if: always()

    steps:
      - name: 📊 Generate Highly Scannable Markdown Summary
        run: |
          echo "# 🛰️ YUN PROTOCOL INTEGRITY SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🌌 Core Federation Diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "| Federation Job | Operational Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F1 · Static Gates (Lint/Types)** | ${{ needs.fast-checks.result == 'success' && '🟢 COMPLIANT' || '🔴 DEVIATED' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F2 · Sovereign Compiler** | ${{ needs.build-artifact.result == 'success' && '🟢 SECURED' || '🔴 FAILURE' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F3 · Isolated Unit Suite (Vitest)** | ${{ needs.quality.result == 'success' && '🟢 VERIFIED' || '🔴 FAILURE' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F4 · Distributed E2E Simulation** | ${{ needs.e2e.result == 'success' && '🟢 EMULATED' || '🔴 FAILURE' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> 💡 **Engine Insight:** Cada ejecución mantiene aislamiento inmutable del entorno, protegiendo los gemelos digitales de Real del Monte y la arquitectura soberana." >> "$GITHUB_STEP_SUMMARY"
