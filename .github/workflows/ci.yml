name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CI: true

jobs:
  fast-checks:
    name: Fast Checks · Lint · Types
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Hardened checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        continue-on-error: true
        run: npm run typecheck

  quality:
    name: Quality · Unit · Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fast-checks
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    steps:
      - name: Hardened checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Unit tests
        run: npm run test:unit -- --reporter=default

      - name: Build
        run: npm run build

      - name: Upload dist artifact (Node 20)
        if: matrix.node == 20
        uses: actions/upload-artifact@v7
        with:
          name: dist-node20
          path: dist
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: E2E · Playwright · Sharded
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]

    steps:
      - name: Hardened checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: npm run build

      - name: Run Playwright E2E (shard ${{ matrix.shard }})
        run: npm run test:e2e -- --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 5

  smoke-main:
    name: Smoke · Critical Paths (main only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hardened checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: npm run build

      - name: Run Playwright smoke tests (@smoke)
        run: npm run test:e2e -- --grep "@smoke"

  deploy-vercel:
    name: Deploy · Vercel
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    environment:
      name: production
      url: https://www.visitarealdelmonte.online

    steps:
      - name: Hardened checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for production
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [fast-checks, quality, e2e]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Real del Monte Digital Hub CI" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fast checks: ${{ needs.fast-checks.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Quality: ${{ needs.quality.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- E2E: ${{ needs.e2e.result }}" >> "$GITHUB_STEP_SUMMARY"
