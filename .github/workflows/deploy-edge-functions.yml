name: "🛰️ YUN Protocol · Supabase Edge Functions Sovereign Deployment"

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: supabase-edge-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_PROJECT_REF: "lbbijzimnydvodtfbjoz"
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  validate-and-deploy:
    name: "🚀 Verify & Deploy Sovereign Edge Network"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Supabase CLI Engine
        uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: 🔗 Link Supabase Project (Sovereign Context)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "🚨 ERROR: SUPABASE_ACCESS_TOKEN no está configurado. Requerido para linkear el proyecto soberano."
            exit 1
          fi

          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase status

      - name: 🔍 Verify Functions Physical Integrity (Heptafederation)
        id: verify_functions
        run: |
          echo "=== Evaluando consistencia física de la Heptafederación ==="

          declare -a core_functions=("isabella-ai" "realito-chat")
          declare -a federated_functions=("telemetry-ingest" "pqc-auth" "constitutional-gate" "mdd-transact" "geospatial-renderer")

          verify_entrypoint() {
            local func="$1"
            local base_dir="supabase/functions/$func"
            if [ ! -d "$base_dir" ]; then
              echo "❌ Directorio inexistente para función '$func' en $base_dir"
              return 1
            fi

            # Preferimos index.ts, pero aceptamos cualquier *.ts como entrada legítima
            if [ -f "$base_dir/index.ts" ] || [ -f "$base_dir/index.js" ]; then
              echo "✅ '$func': entrypoint index.ts/js detectado."
              return 0
            fi

            local ts_files
            ts_files=$(find "$base_dir" -maxdepth 1 -name "*.ts" -o -name "*.js" || true)

            if [ -n "$ts_files" ]; then
              echo "⚠️ '$func': no tiene index.ts/js, pero se detectaron archivos TS/JS en el raíz. Considera normalizar a index.ts para disciplina de despliegue."
              return 0
            fi

            echo "🚨 ERROR: '$func' no tiene ningún entrypoint TS/JS visible en el raíz. No se despliega."
            return 1
          }

          CORE_ERRORS=0

          echo "🔍 Verificando funciones Core F2 (Obligatorias)..."
          for func in "${core_functions[@]}"; do
            if ! verify_entrypoint "$func"; then
              CORE_ERRORS=$((CORE_ERRORS+1))
            fi
          done

          if [ "$CORE_ERRORS" -gt 0 ]; then
            echo "🛑 ERROR CRÍTICO: $CORE_ERRORS función(es) core obligatorias sin estructura válida. Aborting deployment."
            echo "core_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "✅ Todas las funciones core F2 tienen estructura aceptable."
            echo "core_status=ok" >> "$GITHUB_OUTPUT"
          fi

          echo "🔍 Verificando funciones federadas (F3/F4/F5/F6/F7)..."
          FEDERATED_READY=()
          FEDERATED_MISSING=()

          for func in "${federated_functions[@]}"; do
            if verify_entrypoint "$func"; then
              FEDERATED_READY+=("$func")
            else
              FEDERATED_MISSING+=("$func")
            fi
          done

          echo "federated_ready=${FEDERATED_READY[*]}" >> "$GITHUB_OUTPUT"
          echo "federated_missing=${FEDERATED_MISSING[*]}" >> "$GITHUB_OUTPUT"

      - name: 🧠 F2 [ANUBIS] · Deploy Isabella AI (Core Cognitivo)
        id: deploy_isabella
        run: |
          supabase functions deploy isabella-ai \
            --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        continue-on-error: false

      - name: 💬 F2 [ANUBIS] · Deploy Realito Chat (Asistencia Comunitaria)
        id: deploy_realito
        run: |
          supabase functions deploy realito-chat \
            --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        continue-on-error: false

      - name: 🛰️ F7 [CHRONOS] · Deploy Telemetry & Mesh Gateway
        id: deploy_telemetry
        run: |
          if [ -d "supabase/functions/telemetry-ingest" ]; then
            supabase functions deploy telemetry-ingest \
              --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt
          else
            echo "Omitiendo telemetry-ingest (No implementada físicamente)."
          fi
        continue-on-error: true

      - name: ⛓️ F3 [BOOKPI] · Deploy Cryptography Keys & Auth (PQC Guard)
        id: deploy_pqc
        run: |
          if [ -d "supabase/functions/pqc-auth" ]; then
            supabase functions deploy pqc-auth \
              --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          else
            echo "Omitiendo pqc-auth (No implementada físicamente)."
          fi
        continue-on-error: true

      - name: ⚖️ F4 [PHOENIX] · Deploy Constitutional Filter & Rules Engine (Korima)
        id: deploy_constitutional
        run: |
          if [ -d "supabase/functions/constitutional-gate" ]; then
            supabase functions deploy constitutional-gate \
              --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          else
            echo "Omitiendo constitutional-gate (No implementada físicamente)."
          fi
        continue-on-error: true

      - name: 💳 F5 [MDD_TAMV] · Deploy Ledger Transaccional (Economía Phygital)
        id: deploy_mdd
        run: |
          if [ -d "supabase/functions/mdd-transact" ]; then
            supabase functions deploy mdd-transact \
              --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          else
            echo "Omitiendo mdd-transact (No implementada físicamente)."
          fi
        continue-on-error: true

      - name: 🗺️ F6 [KAOS] · Deploy Geolocation Vector Tiles (Spatial Renderer)
        id: deploy_geospatial
        run: |
          if [ -d "supabase/functions/geospatial-renderer" ]; then
            supabase functions deploy geospatial-renderer \
              --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt
          else
            echo "Omitiendo geospatial-renderer (No implementada físicamente)."
          fi
        continue-on-error: true

  summary:
    name: "📊 Sovereign Functions Audit Report"
    runs-on: ubuntu-latest
    needs: validate-and-deploy
    if: always()

    steps:
      - name: 📝 Generate Execution Report
        run: |
          echo "# 🛰️ YUN Edge Engine Deployment Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📡 Estado de los Microservicios de la Heptafederación" >> "$GITHUB_STEP_SUMMARY"
          echo "| Federativa | Servicio Edge | Estado del Despliegue |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"

          # Core: resultado directo de cada step
          echo "| **F2 - ANUBIS** | \`isabella-ai\` | ${{ steps.deploy_isabella.outcome == 'success' && '🟢 DEPLOYED' || '🔴 FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F2 - ANUBIS** | \`realito-chat\` | ${{ steps.deploy_realito.outcome == 'success' && '🟢 DEPLOYED' || '🔴 FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"

          echo "| **F7 - CHRONOS** | \`telemetry-ingest\` | ${{ steps.deploy_telemetry.outcome == 'success' && '🟢 DEPLOYED' || '⚪ OMITIDO / FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F3 - BOOKPI** | \`pqc-auth\` | ${{ steps.deploy_pqc.outcome == 'success' && '🟢 DEPLOYED' || '⚪ OMITIDO / FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F4 - PHOENIX** | \`constitutional-gate\` | ${{ steps.deploy_constitutional.outcome == 'success' && '🟢 DEPLOYED' || '⚪ OMITIDO / FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F5 - MDD_TAMV** | \`mdd-transact\` | ${{ steps.deploy_mdd.outcome == 'success' && '🟢 DEPLOYED' || '⚪ OMITIDO / FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **F6 - KAOS** | \`geospatial-renderer\` | ${{ steps.deploy_geospatial.outcome == 'success' && '🟢 DEPLOYED' || '⚪ OMITIDO / FAILED' }} |" >> "$GITHUB_STEP_SUMMARY"
