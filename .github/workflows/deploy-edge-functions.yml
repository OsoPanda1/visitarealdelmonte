name: "🛰️ YUN Protocol · High-Integrity Sovereign Edge Deployment v1.0"

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: yun-sovereign-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_PROJECT_REF: "lbbijzimnydvodtfbjoz"
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  sovereign-audit-and-deploy:
    name: "🚀 YUN Sovereign Engine · Audit & Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      audit_report: ${{ steps.sovereign_engine.outputs.report }}

    steps:
      - name: 🛡️ Hardened Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link Sovereign Context
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "🚨 ERROR: SUPABASE_ACCESS_TOKEN no está configurado. Requerido para linkear el proyecto soberano."
            exit 1
          fi

          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase status

      - name: 🚀 Execute YUN Sovereign Engine (Heptafederation Graph)
        id: sovereign_engine
        shell: bash
        run: |
          echo "=== YUN Sovereign Engine v3.0 — Heptafederation Graph Validation & Deployment ==="

          # 1. Mapa de Heptafederación — identidad lógica de cada módulo
          declare -A FEDERATION_MAP=(
            ["isabella-ai"]="F2-ANUBIS"
            ["realito-chat"]="F2-ANUBIS"
            ["pqc-auth"]="F3-BOOKPI"
            ["constitutional-gate"]="F4-PHOENIX"
            ["mdd-transact"]="F5-MDD_TAMV"
            ["geospatial-renderer"]="F6-KAOS"
            ["telemetry-ingest"]="F7-CHRONOS"
          )

          # 2. Núcleo obligatorio vs. federaciones opcionales
          CORE_FUNCTIONS=("isabella-ai" "realito-chat")
          FEDERATED_FUNCTIONS=("telemetry-ingest" "pqc-auth" "constitutional-gate" "mdd-transact" "geospatial-renderer")

          verify_entrypoint() {
            local func="$1"
            local base_dir="supabase/functions/$func"

            if [ ! -d "$base_dir" ]; then
              echo "❌ Directorio inexistente para función '$func' en $base_dir"
              return 1
            fi

            # Preferimos index.ts/index.js, pero aceptamos *.ts/*.js en raíz
            if [ -f "$base_dir/index.ts" ] || [ -f "$base_dir/index.js" ]; then
              echo "✅ '$func': entrypoint index.ts/js detectado."
              return 0
            fi

            local ts_files
            ts_files=$(find "$base_dir" -maxdepth 1 -name "*.ts" -o -name "*.js" || true)

            if [ -n "$ts_files" ]; then
              echo "⚠️ '$func': sin index.ts/js, pero con archivos TS/JS en raíz. Disciplina de despliegue recomendada: normalizar a index.ts."
              return 0
            fi

            echo "🚨 ERROR: '$func' sin ningún entrypoint TS/JS visible en raíz. No se despliega."
            return 1
          }

          # 3. Validación de integridad de grafo para núcleo F2 (ANUBIS)
          CORE_ERRORS=0
          echo "🔍 Validando integridad de núcleo F2 (ANUBIS)..."

          for func in "${CORE_FUNCTIONS[@]}"; do
            if [ -z "${FEDERATION_MAP[$func]}" ]; then
              echo "🚨 ERROR: Función core '$func' no está mapeada en FEDERATION_MAP. Ruptura de grafo soberano."
              CORE_ERRORS=$((CORE_ERRORS+1))
              continue
            fi

            if ! verify_entrypoint "$func"; then
              CORE_ERRORS=$((CORE_ERRORS+1))
            fi
          done

          if [ "$CORE_ERRORS" -gt 0 ]; then
            echo "🛑 ERROR CRÍTICO: $CORE_ERRORS función(es) core con errores de integridad. Aborting deployment."
            CORE_STATUS="FAILED"
          else
            echo "✅ Núcleo F2 validado estructuralmente."
            CORE_STATUS="OK"
          fi

          # 4. Validación suave de federaciones opcionales
          echo "🔍 Validando federaciones opcionales (F3-F7)..."
          FEDERATED_READY=()
          FEDERATED_MISSING=()

          for func in "${FEDERATED_FUNCTIONS[@]}"; do
            if [ -z "${FEDERATION_MAP[$func]}" ]; then
              echo "⚠️ Función '$func' sin mapeo en FEDERATION_MAP. Se considera fuera del grafo soberano."
              FEDERATED_MISSING+=("$func")
              continue
            fi

            if verify_entrypoint "$func"; then
              FEDERATED_READY+=("$func")
            else
              FEDERATED_MISSING+=("$func")
            fi
          done

          # 5. Motor de despliegue soberano
          REPORT="| Federación | Servicio | Estado |"
          REPORT+=$'\n'"| :--- | :--- | :--- |"

          if [ "$CORE_STATUS" != "OK" ]; then
            # No despliegues si núcleo está roto
            for func in "${CORE_FUNCTIONS[@]}"; do
              REPORT+=$'\n'"| ${FEDERATION_MAP[$func]:-F2-ANUBIS} | \`$func\` | 🔴 CORE INTEGRITY FAILED |"
            done

            for func in "${FEDERATED_FUNCTIONS[@]}"; do
              REPORT+=$'\n'"| ${FEDERATION_MAP[$func]:-UNKNOWN} | \`$func\` | ⚪ SKIPPED (Core failure) |"
            done
          else
            # Núcleo íntegro: desplegar todo el grafo sujeto a existencia física
            for func in "${!FEDERATION_MAP[@]}"; do
              local fed="${FEDERATION_MAP[$func]}"

              if [ -d "supabase/functions/$func" ]; then
                echo "::group::Deploying $func (${fed})"
                if supabase functions deploy "$func" --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt; then
                  STATUS="✅ DEPLOYED"
                else
                  STATUS="🔴 CRITICAL FAILURE"
                fi
                echo "::endgroup::"
              else
                STATUS="⚪ OFFLINE (Missing Module)"
              fi

              REPORT+=$'\n'"| ${fed} | \`$func\` | $STATUS |"
            done
          fi

          # 6. Escape seguro para GitHub Actions (Output)
          REPORT_ESCAPED="${REPORT//'%'/'%25'}"
          REPORT_ESCAPED="${REPORT_ESCAPED//$'\n'/'%0A'}"
          REPORT_ESCAPED="${REPORT_ESCAPED//$'\r'/'%0D'}"
          echo "report=$REPORT_ESCAPED" >> "$GITHUB_OUTPUT"

  summary:
    name: "📊 YUN Sovereign Edge · Deployment Audit"
    runs-on: ubuntu-latest
    needs: sovereign-audit-and-deploy
    if: always()

    steps:
      - name: 📝 Sovereign Audit Summary
        run: |
          echo "# 🛰️ YUN Protocol · Deployment Audit v3.0" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ needs.sovereign-audit-and-deploy.outputs.audit_report }}" >> "$GITHUB_STEP_SUMMARY"
