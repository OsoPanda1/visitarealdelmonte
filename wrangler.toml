# Cloudflare Pages / Workers config for RDM Digital LTOS.
# Frontend (Vite SPA) is deployed via Cloudflare Pages; this file pins the
# project name, build output, and compatibility flags. Runtime secrets must
# be configured via `wrangler pages secret put <NAME>` or the Cloudflare
# dashboard — never committed.

name = "rdm-digital-ltos"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# === CANONICAL DOMAIN ===
# The ONLY authorized domain for production:
#   https://www.visitarealdelmonte.online
#
# Cloudflare Pages dashboard MUST have the following custom domains configured:
#   - www.visitarealdelmonte.online (production)
#   - visitarealdelmonte.online (redirect to www)
#
# Page Rules (set in Cloudflare Dashboard) REQUIRED:
#   1. visitarealdelmonte.online/* → https://www.visitarealdelmonte.online/* (301)
#   2. *.vercel.app/* → block (404)
#   3. *.pages.dev/* → block (404) — only if not preview domain
#
# The deployment CI gate (see .github/workflows/ci.yml) verifies the deployment
# URL matches the canonical domain before completing. Any deploy to a non-canonical
# URL MUST be treated as a security incident.

# --- Production environment ----------------------------------------------
[env.production]
name = "rdm-digital-ltos"

[env.production.vars]
VITE_APP_ENV = "production"

routes = [
  { pattern = "www.visitarealdelmonte.online", custom_domain = true, zone_id = "" }
]

# Secrets (configure via Cloudflare Dashboard):
#   SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY, TURNSTILE_SECRET_KEY, SENTRY_DSN

# --- Preview environment -------------------------------------------------
[env.preview]
name = "rdm-digital-ltos-preview"

[env.preview.vars]
VITE_APP_ENV = "preview"
