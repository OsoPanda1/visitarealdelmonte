openapi: 3.0.3
info:
  title: RDM Digital Unified API
  version: 1.0.0
  description: |
    API unificada del Gemelo Digital de Real del Monte.
    Endpoints territoriales, de federación, donaciones y métricas.
    Incluye la especificación canónica de ISA-API (Isabella Villaseñor AI)
    como sistema operativo cognitivo interno del ecosistema TAMV Online.
    No depende de ningún proveedor externo de IA.

servers:
  - url: /api
    description: RDM Digital API base (Vercel Edge Functions)
  - url: https://isabella.internal.api
    description: Endpoint interno soberano de Isabella (red TAMV/RDM)

paths:
  # ─── RDM Digital API ───────────────────────────────────────
  /unified/state:
    get:
      summary: Estado global del sistema unificado
      tags: [Unified]
      responses:
        '200':
          description: Estado completo del sistema, readiness, eventos, fusión y persistencia
    post:
      summary: Acciones de control del sistema
      tags: [Unified]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [restart, stop, clear_events]
      responses:
        '200':
          description: Acción ejecutada

  /unified/contribute:
    post:
      summary: Registrar contribución territorial
      tags: [Unified]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContributionRequest'
      responses:
        '201':
          description: Contribución registrada
        '400':
          description: Datos inválidos
        '429':
          description: Demasiadas solicitudes

  /unified/query:
    post:
      summary: Consultar territorio
      tags: [Unified]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Resultado de la consulta

  /isabella/recommendations:
    post:
      summary: Recomendaciones de Isabella
      tags: [Isabella]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                territory:
                  type: string
                traceId:
                  type: string
      responses:
        '200':
          description: Recomendaciones con narrativa y decisiones

  /isabella/feedback:
    post:
      summary: Enviar feedback
      tags: [Isabella]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '200':
          description: Feedback registrado

  /isabella/stream:
    get:
      summary: Stream SSE de decisiones de Isabella
      tags: [Isabella]
      responses:
        '200':
          description: Conexión SSE establecida
          headers:
            Content-Type:
              schema:
                type: string
                example: text/event-stream

  /metrics:
    get:
      summary: Métricas Prometheus
      tags: [System]
      responses:
        '200':
          description: Texto de métricas en formato Prometheus

  /donations/checkout:
    post:
      summary: Crear sesión de donación Stripe
      tags: [Donations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  minimum: 1
      responses:
        '200':
          description: URL de checkout creada

  # ─── ISA-API (Isabella Villaseñor AI) ──────────────────────
  /isabella/orion/search:
    post:
      summary: Arqueología cognitiva de contexto
      tags: [ORION]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrionSearchRequest'
      responses:
        '200':
          description: Resultados de búsqueda y relaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrionSearchResponse'

  /isabella/orion/artifact/{artifact_id}:
    get:
      summary: Obtener artefacto y trazabilidad
      tags: [ORION]
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artefacto y su historia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'

  /isabella/sophia/research:
    post:
      summary: Investigación profunda y síntesis
      tags: [SOPHIA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SophiaResearchRequest'
      responses:
        '200':
          description: Síntesis investigativa y referencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SophiaResearchResponse'

  /isabella/argus/simulate:
    post:
      summary: Simulación de escenarios e impacto
      tags: [ARGUS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArgusSimulationRequest'
      responses:
        '200':
          description: Escenarios, perfil de riesgo y recomendaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArgusSimulationResponse'

  /isabella/mnemos/record:
    post:
      summary: Registrar evento en memoria civilizatoria
      tags: [MNEMOS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MnemosRecordRequest'
      responses:
        '201':
          description: Registro creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MnemosRecordResponse'

  /isabella/mnemos/record/{record_id}:
    get:
      summary: Obtener registro canónico
      tags: [MNEMOS]
      parameters:
        - name: record_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entrada canónica y su grafo de trazabilidad
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MnemosRecordCanonical'

  /isabella/lumen/evaluate:
    post:
      summary: Evaluar acción según gobernanza constitucional
      tags: [LUMEN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LumenEvaluateRequest'
      responses:
        '200':
          description: Decisión, racional y log de auditoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LumenEvaluateResponse'

  /isabella/kernel/resonance/update:
    post:
      summary: Actualizar estado de Resonancia Somática Heptafederada
      tags: [KERNEL, TOPOLOGY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResonanceUpdateRequest'
      responses:
        '200':
          description: Estado de resonancia, zonas de fricción y plan de redirección
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResonanceUpdateResponse'

  /isabella/kernel/timeup/anchor:
    post:
      summary: Anclar y recuperar estado temporal (Crono-Anamnesis)
      tags: [KERNEL]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeUpAnchorRequest'
      responses:
        '200':
          description: Snapshot de estado y análisis de diferencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeUpAnchorResponse'

  /isabella/topology/heptafederation:
    get:
      summary: Descripción de nodos de la Heptafederación TAMV
      tags: [TOPOLOGY]
      responses:
        '200':
          description: Mapa de nodos, roles y enlaces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeptafederationTopology'

  /isabella/topology/nodo_cero:
    get:
      summary: Estado y flujo de trabajo del Nodo Cero (Real del Monte)
      tags: [TOPOLOGY]
      responses:
        '200':
          description: Pipeline operativo del Nodo Cero
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodoCeroWorkflow'

components:
  securitySchemes:
    IsabellaApiKey:
      type: apiKey
      in: header
      name: X-Isabella-Api-Key
    IsabellaTerritorialToken:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ContributionRequest:
      type: object
      required: [userId, type, coords, payload]
      properties:
        userId:
          type: string
          description: ID del usuario
        type:
          type: string
          enum: [checkin, review, photo, rating, tip, event_report, route_trace, poi_suggestion]
        coords:
          type: object
          required: [lat, lng]
          properties:
            lat:
              type: number
              minimum: -90
              maximum: 90
            lng:
              type: number
              minimum: -180
              maximum: 180
        territorio:
          type: string
          default: RDM
        payload:
          type: object
        poiId:
          type: string

    QueryRequest:
      type: object
      required: [text, userId]
      properties:
        text:
          type: string
          maxLength: 1000
        userId:
          type: string
        coords:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number

    FeedbackRequest:
      type: object
      properties:
        territory:
          type: string
          enum: [RDM, PACHUCA, HIDALGO]
          default: RDM
        consent:
          type: boolean
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        comment:
          type: string
          maxLength: 280

    # ── ISA-API schemas ──────────────────────────────────────
    OrionSearchRequest:
      type: object
      properties:
        context_id:
          type: string
        query:
          type: string
        scopes:
          type: array
          items:
            type: string
        filters:
          type: object

    OrionSearchResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        relations:
          type: array
          items:
            $ref: '#/components/schemas/Relation'
        gaps:
          type: array
          items:
            $ref: '#/components/schemas/Gap'
        trace_id:
          type: string

    Artifact:
      type: object
      properties:
        artifact_id:
          type: string
        title:
          type: string
        summary:
          type: string
        source:
          type: string
        confidence_score:
          type: number
          format: float

    Relation:
      type: object
      properties:
        from_artifact_id:
          type: string
        to_artifact_id:
          type: string
        relation_type:
          type: string
        strength:
          type: number
          format: float

    Gap:
      type: object
      properties:
        description:
          type: string
        severity:
          type: string
        suggested_action:
          type: string

    SophiaResearchRequest:
      type: object
      properties:
        research_request:
          type: string
        sources:
          type: array
          items:
            type: string
        depth_level:
          type: integer
        constraints:
          type: object

    SophiaResearchResponse:
      type: object
      properties:
        synthesis:
          type: string
        references:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
        knowledge_gaps:
          type: array
          items:
            $ref: '#/components/schemas/Gap'
        trace_id:
          type: string

    Reference:
      type: object
      properties:
        source_id:
          type: string
        type:
          type: string
        link:
          type: string
        trust_level:
          type: number
          format: float

    ArgusSimulationRequest:
      type: object
      properties:
        scenario_definition:
          type: object
        time_horizon:
          type: string
        dimensions:
          type: array
          items:
            type: string
        constraints:
          type: object

    ArgusSimulationResponse:
      type: object
      properties:
        simulations:
          type: array
          items:
            $ref: '#/components/schemas/Simulation'
        risk_profile:
          $ref: '#/components/schemas/RiskProfile'
        recommendations:
          type: array
          items:
            type: string
        trace_id:
          type: string

    Simulation:
      type: object
      properties:
        scenario_id:
          type: string
        outcomes:
          type: object
        assumptions:
          type: array
          items:
            type: string

    RiskProfile:
      type: object
      properties:
        overall_risk_level:
          type: string
        dimension_risks:
          type: array
          items:
            $ref: '#/components/schemas/DimensionRisk'

    DimensionRisk:
      type: object
      properties:
        dimension:
          type: string
        probability:
          type: number
          format: float
        severity:
          type: number
          format: float

    MnemosRecordRequest:
      type: object
      properties:
        event:
          type: object
        category:
          type: string
        evidence:
          type: array
          items:
            type: object
        retention_policy:
          type: string

    MnemosRecordResponse:
      type: object
      properties:
        record_id:
          type: string
        canonical_entry:
          $ref: '#/components/schemas/MnemosRecordCanonical'
        trace_graph:
          type: object

    MnemosRecordCanonical:
      type: object
      properties:
        record_id:
          type: string
        who:
          type: string
        what:
          type: string
        when:
          type: string
        where:
          type: string
        why:
          type: string
        evidence:
          type: array
          items:
            type: object

    LumenEvaluateRequest:
      type: object
      properties:
        action_request:
          type: object
        policy_context:
          type: object
        risk_level:
          type: string

    LumenEvaluateResponse:
      type: object
      properties:
        decision:
          type: string
        rationale:
          type: string
        log_entry:
          type: object

    ResonanceUpdateRequest:
      type: object
      description: Esquema de datos para la capa de Resonancia Somática Heptafederada
      properties:
        federation_nodes:
          type: array
          items:
            $ref: '#/components/schemas/FederationNodeState'
        mesh_state:
          $ref: '#/components/schemas/MeshState'
        timestamp:
          type: string
          format: date-time

    ResonanceUpdateResponse:
      type: object
      properties:
        resonance_state:
          type: string
        friction_zones:
          type: array
          items:
            $ref: '#/components/schemas/FrictionZone'
        redirect_plan:
          type: object

    FederationNodeState:
      type: object
      description: Estado de cada nodo de la Heptafederación TAMV
      properties:
        node_id:
          type: string
        role:
          type: string
        health_status:
          type: string
        latency_ms:
          type: number
          format: float
        packet_loss_rate:
          type: number
          format: float
        attack_detected:
          type: boolean

    MeshState:
      type: object
      properties:
        connected_nodes:
          type: integer
        isolated_nodes:
          type: integer
        average_latency_ms:
          type: number
          format: float

    FrictionZone:
      type: object
      properties:
        node_id:
          type: string
        severity:
          type: string
        description:
          type: string

    TimeUpAnchorRequest:
      type: object
      properties:
        anchor_id:
          type: string
        time_window:
          type: string
        reason:
          type: string

    TimeUpAnchorResponse:
      type: object
      properties:
        snapshot_state:
          type: object
        diff_analysis:
          type: object

    HeptafederationTopology:
      type: object
      description: Arquitectura de los nodos de la Heptafederación TAMV
      properties:
        federations:
          type: array
          items:
            $ref: '#/components/schemas/FederationNode'
        links:
          type: array
          items:
            $ref: '#/components/schemas/FederationLink'

    FederationNode:
      type: object
      properties:
        node_id:
          type: string
        name:
          type: string
        role:
          type: string
        location:
          type: string

    FederationLink:
      type: object
      properties:
        from_node_id:
          type: string
        to_node_id:
          type: string
        link_type:
          type: string

    NodoCeroWorkflow:
      type: object
      description: Flujo de trabajo para la implementación del Nodo Cero en Real del Monte
      properties:
        stages:
          type: array
          items:
            $ref: '#/components/schemas/NodoCeroStage'
        owner:
          type: string
        status:
          type: string

    NodoCeroStage:
      type: object
      properties:
        stage_id:
          type: string
        name:
          type: string
        description:
          type: string
        dependencies:
          type: array
          items:
            type: string

tags:
  - name: Unified
    description: Sistema Unificado — estado, contribuciones y consultas territoriales
  - name: Isabella
    description: Isabella Villaseñor AI — recomendaciones, feedback y streaming
  - name: System
    description: Métricas del sistema
  - name: Donations
    description: Donaciones vía Stripe
  - name: ORION
    description: Cognitive Archaeology Engine
  - name: SOPHIA
    description: Deep Research and Synthesis Engine
  - name: ARGUS
    description: Future Impact Simulation Engine
  - name: MNEMOS
    description: Civilizational Preservation Engine
  - name: LUMEN
    description: Constitutional Governance Engine
  - name: KERNEL
    description: Capacidades cognitivas avanzadas del núcleo de Isabella
  - name: TOPOLOGY
    description: Arquitectura de la Heptafederación TAMV y Nodo Cero

security:
  - IsabellaApiKey: []
  - IsabellaTerritorialToken: []
