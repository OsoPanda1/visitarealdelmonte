          <p>
            Explora la historia minera, los pastes y la arquitectura de Real del Monte desde una plataforma territorial inteligente.
          </p>
        </header>

        <section aria-labelledby="rdm-historia">
          <h2 id="rdm-historia">Historia y legado minero</h2>
          <p>
            Real del Monte forma parte del Corredor de la Montaña de Hidalgo, un territorio marcado por sus minas,
            sus leyendas y el encuentro entre culturas que dieron forma a este Pueblo Mágico.
          </p>
        </section>

        <section aria-labelledby="rdm-gastro">
          <h2 id="rdm-gastro">Gastronomía y pastes</h2>
          <p>
            La tradición de los pastes, el pan de pulque y las enchiladas mineras hacen de Real del Monte un destino imprescindible para quienes buscan sabores con identidad.
          </p>
        </section>

        <section aria-labelledby="rdm-explorar">
          <h2 id="rdm-explorar">Explora el territorio</h2>
          <p>
            Visita minas históricas, el Panteón Inglés, el centro histórico y las rutas naturales que conectan con otros Pueblos Mágicos del estado de Hidalgo.

        </section>
